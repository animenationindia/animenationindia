name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios-app
          xcodegen generate

      - name: Build iOS App (iOS Device SDK - Unsigned)
        run: |
          cd ios-app
          xcodebuild build \
            -project AnimeNationIndia.xcodeproj \
            -scheme AnimeNationIndia \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR=build/Release-iphoneos

      - name: Create Payload and IPA
        run: |
          cd ios-app
          mkdir -p build/Release-iphoneos/Payload
          cp -r build/Release-iphoneos/AnimeNationIndia.app build/Release-iphoneos/Payload/
          cd build/Release-iphoneos
          zip -r AnimeNationIndia.ipa Payload

      - name: Commit and Push IPA to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ios-app/build-artifact
          cp ios-app/build/Release-iphoneos/AnimeNationIndia.ipa ios-app/build-artifact/AnimeNationIndia.ipa
          git add ios-app/build-artifact/AnimeNationIndia.ipa
          git commit -m "build(ios): update pre-compiled unsigned IPA [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimeNationIndia-iOS-Device-Unsigned
          path: ios-app/build/Release-iphoneos/AnimeNationIndia.ipa
